<html lang="de">

  <style>
    .error-wrap {
      min-height: calc(100vh - var(--nav-h) - 6rem);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem var(--pad-x);
      text-align: center;

      line-height: 1;

    .error-msg {

  <a class="skip-link" href="#main">Zum Inhalt springen</a>
